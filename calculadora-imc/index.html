<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="CSS/estilo.css">
</head>

<body>

    <div class="container">


        <section class="card" id="card-form">

            <h1>Calculadora de IMC</h1>

            <div class="campo">
                <label for="altura">Altura:</label>
                <input type="number" id="altura" placeholder="Exemplo: 1.75" step="0.01">
            </div>

            <div class="campo">
                <label for="peso">Peso:</label>
                <input type="number" id="peso" placeholder="Exemplo: 70.5" step="0.1">
            </div>

            <div class="botoes">
                <button class="btn-calcular" onclick="calcularIMC()">
                    CALCULAR
                </button>

                <button class="btn-limpar" onclick="limparCampos()">
                    LIMPAR
                </button>
            </div>

        </section>


        <section class="card resultado-card" id="resultado-card">

            <h2>
                Seu IMC:
                <span id="valor-imc"></span>
            </h2>

            <p class="situacao">
                Situação atual:
                <span id="situacao"></span>
            </p>

            <h3>Confira as classificações</h3>

            <table>

                <tr>
                    <th>IMC</th>
                    <th>Classificação</th>
                    <th>Obesidade</th>
                </tr>

                <tr>
                    <td>Menor que 18,5</td>
                    <td>Magreza</td>
                    <td>0</td>
                </tr>

                <tr>
                    <td>Entre 18,5 e 24,9</td>
                    <td>Normal</td>
                    <td>0</td>
                </tr>

                <tr>
                    <td>Entre 25,0 e 29,9</td>
                    <td>Sobrepeso</td>
                    <td>I</td>
                </tr>

                <tr>
                    <td>Entre 30,0 e 39,9</td>
                    <td>Obesidade</td>
                    <td>II</td>
                </tr>

                <tr>
                    <td>Maior que 40,0</td>
                    <td>Obesidade grave</td>
                    <td>III</td>
                </tr>

            </table>

            <button class="btn-voltar" onclick="voltar()">
                VOLTAR
            </button>

        </section>

    </div>

    <script src="JS/script.js"></script>

</body>

</html>
